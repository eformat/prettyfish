<svg width="32" height="32" viewBox="0 2 32 28" xmlns="http://www.w3.org/2000/svg">
  <!-- top L: horizontal right → vertical up -->
  <polyline points="22,14 30,14 30,5"
    fill="none" stroke="#1d4ed8" stroke-width="2.4"
    stroke-linecap="round" stroke-linejoin="round"/>
  <!-- bottom L: horizontal right → vertical down -->
  <polyline points="22,14 30,14 30,23"
    fill="none" stroke="#1d4ed8" stroke-width="2.4"
    stroke-linecap="round" stroke-linejoin="round"/>
  <!-- top arrowhead -->
  <polyline points="27.8,7.2 30,5 32.2,7.2"
    fill="none" stroke="#1d4ed8" stroke-width="2.4" stroke-linecap="round" stroke-linejoin="round"/>
  <!-- bottom arrowhead -->
  <polyline points="27.8,20.8 30,23 32.2,20.8"
    fill="none" stroke="#1d4ed8" stroke-width="2.4" stroke-linecap="round" stroke-linejoin="round"/>
  <!-- pill body -->
  <rect x="1" y="5" width="21" height="18" rx="9" ry="9" fill="#2563eb"/>
  <!-- eye: white outer, dark pupil -->
  <circle cx="9" cy="11" r="3.0" fill="#fff"/>
  <circle cx="9" cy="11" r="1.2" fill="#0a2560"/>
</svg>
