apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ .Release.Name }}-relay
  labels:
    app: {{ .Release.Name }}-relay
    app.kubernetes.io/name: {{ .Chart.Name }}-relay
    app.kubernetes.io/instance: {{ .Release.Name }}
spec:
  replicas: {{ .Values.replicaCount }}
  selector:
    matchLabels:
      app: {{ .Release.Name }}-relay
  template:
    metadata:
      labels:
        app: {{ .Release.Name }}-relay
        app.kubernetes.io/name: {{ .Chart.Name }}-relay
        app.kubernetes.io/instance: {{ .Release.Name }}
    spec:
      containers:
        - name: relay
          image: "{{ .Values.relay.image.repository }}:{{ .Values.relay.image.tag }}"
          imagePullPolicy: {{ .Values.relay.image.pullPolicy }}
          ports:
            - name: http
              containerPort: 8081
              protocol: TCP
          livenessProbe:
            tcpSocket:
              port: http
            initialDelaySeconds: 5
            periodSeconds: 10
          readinessProbe:
            tcpSocket:
              port: http
            initialDelaySeconds: 3
            periodSeconds: 5
          resources:
            {{- toYaml .Values.relay.resources | nindent 12 }}
