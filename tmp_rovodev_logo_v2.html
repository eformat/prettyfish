<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<title>Pretty Fish Logo Ideas v2</title>
<style>
  * { margin: 0; box-sizing: border-box; }
  body { font-family: system-ui, sans-serif; background: #0f0f0f; color: #e0e0e0; padding: 40px; }
  h1 { text-align: center; font-size: 24px; margin-bottom: 6px; color: #fff; }
  h2 { font-size: 16px; color: #a78bfa; margin: 32px 0 16px; border-bottom: 1px solid #2a2a2a; padding-bottom: 6px; }
  .subtitle { text-align: center; color: #888; margin-bottom: 32px; font-size: 13px; }
  .grid { display: grid; grid-template-columns: repeat(5, 1fr); gap: 24px; max-width: 1100px; margin: 0 auto; }
  .card { background: #1a1a1a; border-radius: 12px; padding: 16px; text-align: center; border: 1px solid #2a2a2a; }
  .card:hover { border-color: #7c3aed; }
  .sizes { display: flex; align-items: center; justify-content: center; gap: 10px; margin-bottom: 10px; }
  .label { font-size: 12px; font-weight: 600; color: #ccc; margin-bottom: 2px; }
  .desc { font-size: 10px; color: #666; line-height: 1.3; }
</style>
</head>
<body>
<h1>Pretty Fish — Logo v2</h1>
<p class="subtitle">Variants of: Bubble Fish, Origami Fish, Node Graph, Flowchart Fish (compact)</p>

<h2>Bubble Fish variants</h2>
<div class="grid" id="bubble"></div>

<h2>Origami Fish variants</h2>
<div class="grid" id="origami"></div>

<h2>Node Graph variants</h2>
<div class="grid" id="nodes"></div>

<h2>Flowchart Fish (compact) variants</h2>
<div class="grid" id="flow"></div>

<script>
function wrap(svg, size) {
  const s = svg.replace(/width="\d+" height="\d+"/, `width="${size}" height="${size}"`);
  return `<div style="width:${size}px;height:${size}px;border:1px solid #555;border-radius:2px;display:flex;align-items:center;justify-content:center;background:#111;overflow:hidden">${s}</div>`;
}
function card(label, desc, svg32) {
  return `<div class="card"><div class="sizes">${wrap(svg32, 64)}${wrap(svg32, 32)}${wrap(svg32, 16)}</div><div class="label">${label}</div><div class="desc">${desc}</div></div>`;
}

// ── BUBBLE FISH ──
document.getElementById('bubble').innerHTML = [

card('Bubble Classic', 'Round body, split fins, big eye',
`<svg width="32" height="32" viewBox="0 0 32 32"><circle cx="14" cy="16" r="10" fill="#7c3aed"/><polygon points="23,10 30,6 30,14" fill="#a78bfa"/><polygon points="23,18 30,14 30,26" fill="#8b5cf6"/><circle cx="11" cy="14" r="2.5" fill="#fff"/><circle cx="11" cy="14" r="1" fill="#4c1d95"/><path d="M8,20 Q14,24 20,20" stroke="#a78bfa" stroke-width="1" fill="none"/></svg>`),

card('Bubble Gradient', 'Radial gradient body, glow eye',
`<svg width="32" height="32" viewBox="0 0 32 32"><defs><radialGradient id="bg1"><stop offset="0%" stop-color="#a78bfa"/><stop offset="100%" stop-color="#6d28d9"/></radialGradient></defs><circle cx="14" cy="16" r="11" fill="url(#bg1)"/><polygon points="24,9 31,5 31,15" fill="#c084fc"/><polygon points="24,19 31,17 31,27" fill="#a78bfa"/><circle cx="10" cy="13" r="3" fill="#fff" opacity="0.9"/><circle cx="10.5" cy="12.5" r="1.2" fill="#4c1d95"/></svg>`),

card('Bubble Minimal', 'No mouth, single tail, bold',
`<svg width="32" height="32" viewBox="0 0 32 32"><circle cx="13" cy="16" r="11" fill="#7c3aed"/><polygon points="23,16 31,8 31,24" fill="#a78bfa"/><circle cx="10" cy="13" r="3" fill="#fff"/><circle cx="10" cy="13" r="1.2" fill="#2e1065"/></svg>`),

card('Bubble Duo', 'Two-tone split body',
`<svg width="32" height="32" viewBox="0 0 32 32"><path d="M2,16 A11,11 0 0,1 24,16Z" fill="#a78bfa"/><path d="M2,16 A11,11 0 0,0 24,16Z" fill="#7c3aed"/><polygon points="24,16 31,9 31,23" fill="#c084fc"/><circle cx="9" cy="13" r="2.5" fill="#fff"/><circle cx="9" cy="13" r="1" fill="#4c1d95"/></svg>`),

].join('');

// ── ORIGAMI FISH ──
document.getElementById('origami').innerHTML = [

card('Origami Sharp', 'Angular facets, sharp tail',
`<svg width="32" height="32" viewBox="0 0 32 32"><polygon points="4,16 16,5 25,16" fill="#a78bfa"/><polygon points="4,16 16,27 25,16" fill="#7c3aed"/><polygon points="4,16 16,16 16,5" fill="#8b5cf6" opacity="0.5"/><polygon points="25,16 31,10 31,22" fill="#c084fc"/><circle cx="19" cy="12" r="1.5" fill="#fff"/></svg>`),

card('Origami Squat', 'Wider, squarish proportions',
`<svg width="32" height="32" viewBox="0 0 32 32"><polygon points="3,16 15,5 26,16" fill="#a78bfa"/><polygon points="3,16 15,27 26,16" fill="#7c3aed"/><polygon points="3,16 15,16 15,5" fill="#8b5cf6" opacity="0.5"/><polygon points="26,16 31,11 31,21" fill="#c084fc"/><polygon points="26,16 31,16 31,21" fill="#a78bfa" opacity="0.6"/><circle cx="20" cy="13" r="1.5" fill="#fff"/><circle cx="20" cy="13" r="0.5" fill="#2e1065"/></svg>`),

card('Origami Warm', 'Coral + amber tones',
`<svg width="32" height="32" viewBox="0 0 32 32"><polygon points="3,16 16,5 25,16" fill="#fb923c"/><polygon points="3,16 16,27 25,16" fill="#f97316"/><polygon points="3,16 16,16 16,5" fill="#fdba74" opacity="0.5"/><polygon points="25,16 31,10 31,22" fill="#fbbf24"/><circle cx="19" cy="12" r="1.5" fill="#fff"/><circle cx="19" cy="12" r="0.5" fill="#7c2d12"/></svg>`),

card('Origami Multi', 'Three-facet gradient',
`<svg width="32" height="32" viewBox="0 0 32 32"><polygon points="3,16 16,4 26,16" fill="#c084fc"/><polygon points="3,16 16,28 26,16" fill="#7c3aed"/><polygon points="3,16 12,10 16,16" fill="#a78bfa" opacity="0.7"/><polygon points="3,16 12,22 16,16" fill="#6d28d9" opacity="0.7"/><polygon points="26,16 31,10 31,22" fill="#e9d5ff"/><circle cx="20" cy="12" r="1.5" fill="#fff"/></svg>`),

].join('');

// ── NODE GRAPH ──
document.getElementById('nodes').innerHTML = [

card('Nodes Diamond', 'Classic 5-node diamond',
`<svg width="32" height="32" viewBox="0 0 32 32"><line x1="8" y1="8" x2="16" y2="16" stroke="#6d28d9" stroke-width="2"/><line x1="24" y1="8" x2="16" y2="16" stroke="#6d28d9" stroke-width="2"/><line x1="16" y1="16" x2="8" y2="24" stroke="#6d28d9" stroke-width="2"/><line x1="16" y1="16" x2="24" y2="24" stroke="#6d28d9" stroke-width="2"/><circle cx="8" cy="8" r="3" fill="#a78bfa"/><circle cx="24" cy="8" r="3" fill="#c084fc"/><circle cx="16" cy="16" r="4" fill="#7c3aed"/><circle cx="8" cy="24" r="3" fill="#8b5cf6"/><circle cx="24" cy="24" r="3" fill="#a78bfa"/></svg>`),

card('Nodes Triangle', '3-node triangle, bold',
`<svg width="32" height="32" viewBox="0 0 32 32"><line x1="16" y1="6" x2="6" y2="24" stroke="#6d28d9" stroke-width="2.5"/><line x1="16" y1="6" x2="26" y2="24" stroke="#6d28d9" stroke-width="2.5"/><line x1="6" y1="24" x2="26" y2="24" stroke="#6d28d9" stroke-width="2.5"/><circle cx="16" cy="6" r="4" fill="#c084fc"/><circle cx="6" cy="24" r="4" fill="#7c3aed"/><circle cx="26" cy="24" r="4" fill="#a78bfa"/></svg>`),

card('Nodes Star', 'Central hub, 4 spokes',
`<svg width="32" height="32" viewBox="0 0 32 32"><line x1="16" y1="16" x2="16" y2="4" stroke="#6d28d9" stroke-width="2"/><line x1="16" y1="16" x2="28" y2="16" stroke="#6d28d9" stroke-width="2"/><line x1="16" y1="16" x2="16" y2="28" stroke="#6d28d9" stroke-width="2"/><line x1="16" y1="16" x2="4" y2="16" stroke="#6d28d9" stroke-width="2"/><circle cx="16" cy="16" r="4.5" fill="#7c3aed"/><circle cx="16" cy="4" r="3" fill="#a78bfa"/><circle cx="28" cy="16" r="3" fill="#c084fc"/><circle cx="16" cy="28" r="3" fill="#8b5cf6"/><circle cx="4" cy="16" r="3" fill="#a78bfa"/></svg>`),

card('Nodes Cascade', 'Tree-like, top-down',
`<svg width="32" height="32" viewBox="0 0 32 32"><line x1="16" y1="6" x2="8" y2="16" stroke="#6d28d9" stroke-width="2"/><line x1="16" y1="6" x2="24" y2="16" stroke="#6d28d9" stroke-width="2"/><line x1="8" y1="16" x2="5" y2="26" stroke="#6d28d9" stroke-width="2"/><line x1="8" y1="16" x2="12" y2="26" stroke="#6d28d9" stroke-width="2"/><line x1="24" y1="16" x2="20" y2="26" stroke="#6d28d9" stroke-width="2"/><line x1="24" y1="16" x2="27" y2="26" stroke="#6d28d9" stroke-width="2"/><circle cx="16" cy="6" r="3.5" fill="#c084fc"/><circle cx="8" cy="16" r="3" fill="#7c3aed"/><circle cx="24" cy="16" r="3" fill="#a78bfa"/><circle cx="5" cy="26" r="2.5" fill="#8b5cf6"/><circle cx="12" cy="26" r="2.5" fill="#8b5cf6"/><circle cx="20" cy="26" r="2.5" fill="#a78bfa"/><circle cx="27" cy="26" r="2.5" fill="#a78bfa"/></svg>`),

].join('');

// ── FLOWCHART FISH (COMPACT) ──
document.getElementById('flow').innerHTML = [

card('FC Fish Compact', 'Short rounded rect body, eye, tail',
`<svg width="32" height="32" viewBox="0 0 32 32"><rect x="4" y="8" width="18" height="16" rx="5" fill="#7c3aed"/><polygon points="22,12 29,8 29,24 22,20" fill="#a78bfa"/><circle cx="11" cy="14" r="2.5" fill="#fff"/><circle cx="11" cy="14" r="1" fill="#4c1d95"/></svg>`),

card('FC Fish Duo', 'Two-node body, tiny connector',
`<svg width="32" height="32" viewBox="0 0 32 32"><rect x="2" y="9" width="12" height="14" rx="4" fill="#7c3aed"/><rect x="16" y="9" width="10" height="14" rx="4" fill="#a78bfa"/><line x1="14" y1="16" x2="16" y2="16" stroke="#c084fc" stroke-width="2"/><polygon points="26,12 31,8 31,24 26,20" fill="#8b5cf6"/><circle cx="8" cy="14" r="2" fill="#fff"/><circle cx="8" cy="14" r="0.8" fill="#2e1065"/></svg>`),

card('FC Fish Round', 'Rounded square body, stubby tail',
`<svg width="32" height="32" viewBox="0 0 32 32"><rect x="3" y="6" width="20" height="20" rx="7" fill="#7c3aed"/><polygon points="23,12 30,8 30,24 23,20" fill="#c084fc"/><circle cx="12" cy="13" r="3" fill="#fff"/><circle cx="12.5" cy="12.5" r="1.2" fill="#4c1d95"/></svg>`),

card('FC Fish Pill', 'Pill-shaped body, split tail',
`<svg width="32" height="32" viewBox="0 0 32 32"><rect x="3" y="9" width="19" height="14" rx="7" fill="#7c3aed"/><polygon points="21,11 28,6 28,15" fill="#a78bfa"/><polygon points="21,21 28,26 28,17" fill="#8b5cf6"/><circle cx="10" cy="14" r="2.5" fill="#fff"/><circle cx="10" cy="14" r="1" fill="#2e1065"/></svg>`),

].join('');
</script>
</body>
</html>
