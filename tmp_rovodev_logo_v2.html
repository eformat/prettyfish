<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<title>Pretty Fish — Blue Connector Optimizer</title>
<style>
*{margin:0;box-sizing:border-box}
body{font-family:system-ui,sans-serif;background:#0f0f0f;color:#e0e0e0;padding:32px}
h1{text-align:center;font-size:20px;margin-bottom:4px;color:#fff}
p.sub{text-align:center;color:#555;margin-bottom:24px;font-size:12px}
h2{font-size:11px;color:#60a5fa;margin:24px 0 10px;border-bottom:1px solid #222;padding-bottom:4px;text-transform:uppercase;letter-spacing:.08em}
.row{display:flex;gap:14px;flex-wrap:wrap;margin-bottom:8px}
.card{background:#1a1a1a;border-radius:10px;padding:12px;border:1px solid #222;text-align:center;min-width:120px}
.card.best{border-color:#60a5fa}
.name{font-size:10px;color:#aaa;margin-bottom:6px;font-weight:600}
.coverage{font-size:11px;color:#60a5fa;margin-top:6px;font-weight:700}
.bg-row{display:flex;gap:8px;justify-content:center}
.dk{background:#080808;border-radius:6px;padding:5px;line-height:0}
.lt{background:#f5f5f5;border-radius:6px;padding:5px;line-height:0}
.szrow{display:flex;align-items:flex-end;gap:6px;line-height:0}
canvas{display:none}
</style>
</head>
<body>
<h1>🐟 Blue Connector Fish — Optimizer</h1>
<p class="sub">Pixel coverage analysis: maximizing filled area in square viewport</p>
<div id="app"></div>
<canvas id="c" width="128" height="128"></canvas>

<script>
const ctx = document.getElementById('c').getContext('2d')

// Measure pixel coverage: renders SVG to canvas, counts non-background pixels
async function coverage(svgStr, size=128) {
  return new Promise(resolve => {
    const blob = new Blob([svgStr.replace(/width="\d+" height="\d+"/, `width="${size}" height="${size}"`)], {type:'image/svg+xml'})
    const url = URL.createObjectURL(blob)
    const img = new Image()
    img.onload = () => {
      ctx.clearRect(0,0,size,size)
      ctx.drawImage(img,0,0,size,size)
      const d = ctx.getImageData(0,0,size,size).data
      let filled = 0
      for (let i=0; i<d.length; i+=4) {
        // count non-transparent, non-white pixels
        if (d[i+3] > 30 && !(d[i]>240 && d[i+1]>240 && d[i+2]>240)) filled++
      }
      URL.revokeObjectURL(url)
      resolve(Math.round(filled / (size*size) * 100))
    }
    img.src = url
  })
}

function makeFish({
  // viewBox
  vx=0, vy=0, vw=32, vh=32,
  // pill
  px=1, py=5, pw=22, ph=22, pr=11,
  bodyFill='#2563eb',
  // connector origin (where lines branch from — right-center of pill)
  ox=23, oy=16,
  // how far right before turning
  armLen=7,
  // how far up/down the vertical goes
  vLen=10,
  // stroke
  stroke='#1d4ed8', strokeW=2.2,
  // arrow size
  arrSize=2.2,
  // eye
  ex=10, ey=12, er=3.2, epr=1.3,
} = {}) {
  const ax = ox + armLen        // corner X
  const topY = oy - vLen        // top endpoint Y
  const botY = oy + vLen        // bottom endpoint Y

  return `<svg width="32" height="32" viewBox="${vx} ${vy} ${vw} ${vh}" xmlns="http://www.w3.org/2000/svg">
  <!-- top L: horizontal right → vertical up -->
  <polyline points="${ox},${oy} ${ax},${oy} ${ax},${topY}"
    fill="none" stroke="${stroke}" stroke-width="${strokeW}"
    stroke-linecap="round" stroke-linejoin="round"/>
  <!-- bottom L: horizontal right → vertical down -->
  <polyline points="${ox},${oy} ${ax},${oy} ${ax},${botY}"
    fill="none" stroke="${stroke}" stroke-width="${strokeW}"
    stroke-linecap="round" stroke-linejoin="round"/>
  <!-- top arrowhead -->
  <polyline points="${ax-arrSize},${topY+arrSize} ${ax},${topY} ${ax+arrSize},${topY+arrSize}"
    fill="none" stroke="${stroke}" stroke-width="${strokeW}" stroke-linecap="round" stroke-linejoin="round"/>
  <!-- bottom arrowhead -->
  <polyline points="${ax-arrSize},${botY-arrSize} ${ax},${botY} ${ax+arrSize},${botY-arrSize}"
    fill="none" stroke="${stroke}" stroke-width="${strokeW}" stroke-linecap="round" stroke-linejoin="round"/>
  <!-- pill body -->
  <rect x="${px}" y="${py}" width="${pw}" height="${ph}" rx="${pr}" ry="${pr}" fill="${bodyFill}"/>
  <!-- eye: white outer, dark pupil — no inner highlight dot (too small at favicon size) -->
  <circle cx="${ex}" cy="${ey}" r="${er}" fill="#fff"/>
  <circle cx="${ex}" cy="${ey}" r="${epr}" fill="#0a2560"/>
</svg>`
}

function show(svg, sizes=[64,32,20,16]) {
  return sizes.map(s => svg.replace(/width="\d+" height="\d+"/, `width="${s}" height="${s}"`)).join('')
}
function card(name, svg, pct) {
  const s = show(svg)
  return `<div class="card" id="card_${name.replace(/\W/g,'_')}">
    <div class="name">${name}</div>
    <div class="bg-row">
      <div class="dk"><div class="szrow">${s}</div></div>
      <div class="lt"><div class="szrow">${s}</div></div>
    </div>
    <div class="coverage">${pct}% coverage</div>
  </div>`
}

// Generate variants with different geometry parameters
const variants = [
  // baseline
  { name:'Baseline', vx:0,vy:0,vw:32,vh:32, px:1,py:5,pw:22,ph:22,pr:11, ox:23,oy:16, armLen:7,vLen:10, strokeW:2.2, arrSize:2.2, ex:10,ey:12,er:3.2,epr:1.3 },
  // taller pill
  { name:'Taller pill', vx:0,vy:0,vw:32,vh:32, px:1,py:3,pw:22,ph:26,pr:13, ox:23,oy:16, armLen:7,vLen:12, strokeW:2.2, arrSize:2.2, ex:10,ey:11,er:3.5,epr:1.4 },
  // shift viewBox to use more space
  { name:'Tight viewBox', vx:-1,vy:-1,vw:34,vh:34, px:1,py:4,pw:23,ph:24,pr:12, ox:24,oy:16, armLen:7,vLen:12, strokeW:2.4, arrSize:2.3, ex:10,ey:11,er:3.5,epr:1.4 },
  // longer arm, taller verts
  { name:'Long arm', vx:0,vy:0,vw:34,vh:34, px:1,py:5,pw:22,ph:24,pr:12, ox:23,oy:17, armLen:9,vLen:13, strokeW:2.2, arrSize:2.2, ex:10,ey:12,er:3.2,epr:1.3 },
  // shorter arm, wider pill
  { name:'Wide pill', vx:0,vy:1,vw:32,vh:30, px:0,py:4,pw:24,ph:22,pr:11, ox:24,oy:15, armLen:6,vLen:10, strokeW:2.4, arrSize:2.2, ex:10,ey:12,er:3.5,epr:1.4 },
  // bigger strokes
  { name:'Bold stroke', vx:0,vy:0,vw:32,vh:32, px:1,py:5,pw:22,ph:22,pr:11, ox:23,oy:16, armLen:7,vLen:10, strokeW:3, arrSize:2.8, ex:10,ey:12,er:3.2,epr:1.3 },
  // maximize coverage: large pill, arm starts where pill ends, max vert
  { name:'Max fill A', vx:0,vy:0,vw:32,vh:32, px:0,py:4,pw:23,ph:24,pr:12, ox:23,oy:16, armLen:7,vLen:12, strokeW:2.5, arrSize:2.4, ex:10,ey:11,er:3.8,epr:1.5 },
  // square pill (more fish body feel)
  { name:'Square pill', vx:0,vy:2,vw:32,vh:28, px:1,py:5,pw:21,ph:18,pr:9, ox:22,oy:14, armLen:8,vLen:9, strokeW:2.4, arrSize:2.2, ex:9,ey:11,er:3.0,epr:1.2 },
  // asymmetric: eye higher, pill occupies left 70%
  { name:'Eye high', vx:0,vy:0,vw:32,vh:32, px:1,py:4,pw:22,ph:24,pr:12, ox:23,oy:16, armLen:7,vLen:13, strokeW:2.2, arrSize:2.2, ex:9,ey:10,er:3.5,epr:1.4 },
  // compact: pill shifted left, connectors take more right space
  { name:'Compact', vx:0,vy:1,vw:32,vh:30, px:0,py:4,pw:20,ph:22,pr:11, ox:20,oy:15, armLen:10,vLen:11, strokeW:2.4, arrSize:2.2, ex:9,ey:11,er:3.2,epr:1.3 },
]

async function run() {
  const results = []
  for (const v of variants) {
    const svg = makeFish(v)
    const pct = await coverage(svg)
    results.push({ ...v, svg, pct })
  }
  results.sort((a,b) => b.pct - a.pct)
  const best = results[0].pct

  let h = '<h2>Coverage ranking (highest = best use of square canvas)</h2><div class="row">'
  for (const r of results) {
    let c = card(r.name + (r.pct===best?' ⭐':''), r.svg, r.pct)
    h += c
  }
  h += '</div>'

  // Show best at large size
  const top = results[0]
  h += `<h2>Best: ${top.name} — ${top.pct}% coverage</h2>`
  h += `<div style="display:flex;gap:20px;align-items:flex-end;margin-bottom:16px">`
  for (const s of [256,128,64,32,20,16]) {
    h += `<div style="text-align:center;line-height:0">
      ${top.svg.replace(/width="\d+" height="\d+"/, `width="${s}" height="${s}"`)}
      <div style="font-size:10px;color:#555;margin-top:4px">${s}px</div>
    </div>`
  }
  h += `</div>`

  // Also show final clean SVG code
  h += `<h2>SVG source (best)</h2>`
  h += `<pre style="background:#111;padding:12px;border-radius:8px;font-size:11px;color:#a78bfa;overflow-x:auto;white-space:pre-wrap">${top.svg.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;')}</pre>`

  document.getElementById('app').innerHTML = h
}

run()
</script>
</body>
</html>
